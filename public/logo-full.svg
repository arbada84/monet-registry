  </g>
  <!-- Korean text -->
  <text x="78" y="42" font-family="'Noto Sans KR', sans-serif" font-size="28" font-weight="700" fill="#4A3A8E" letter-spacing="-0.5">컬처피플</text>
  <!-- English text -->
  <text x="78" y="62" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#8B7BBE" letter-spacing="1.5">THE CULTURE PEOPLE</text>
