name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:all

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_r6EedfOTYhrZjdhxlDEFeSBF
      VERCEL_PROJECT_ID: prj_fN7aCu9wkSUs6FsxLbrFIiEpCawY
    steps:
      - uses: actions/checkout@v4
      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "❌ VERCEL_TOKEN secret이 설정되지 않았습니다."
            echo "GitHub 레포 → Settings → Secrets and variables → Actions → VERCEL_TOKEN 추가 필요"
            exit 1
          fi
          echo "✅ VERCEL_TOKEN 확인됨"
      - name: Deploy to Vercel
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
