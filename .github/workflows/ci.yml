name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:all

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_r6EedfOTYhrZjdhxlDEFeSBF
      VERCEL_PROJECT_ID: prj_fN7aCu9wkSUs6FsxLbrFIiEpCawY
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Check VERCEL_TOKEN
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret이 설정되지 않았습니다."
            echo "GitHub 저장소 Settings > Secrets and variables > Actions > VERCEL_TOKEN 추가가 필요합니다."
            exit 1
          fi
          echo "VERCEL_TOKEN 확인 완료"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build for Vercel
        run: npx vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
