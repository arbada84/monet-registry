name: Auto Press Worker Deploy

on:
  push:
    branches: [main]
    paths:
      - "cloudflare/auto-press-worker/**"
      - ".github/workflows/deploy-auto-press-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Cloudflare secrets
        id: cloudflare
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN 또는 CLOUDFLARE_ACCOUNT_ID secret이 없어 Worker 자동 배포를 건너뜁니다."
            echo "GitHub 저장소 Settings > Secrets and variables > Actions에 두 값을 추가하면 다음 Worker 변경부터 자동 배포됩니다."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Cloudflare Worker 배포 secret 확인 완료"

      - name: Validate Worker syntax
        if: steps.cloudflare.outputs.enabled == 'true'
        run: node --check cloudflare/auto-press-worker/src/index.js

      - name: Deploy Worker
        if: steps.cloudflare.outputs.enabled == 'true'
        run: npx wrangler@4.90.1 deploy --config cloudflare/auto-press-worker/wrangler.toml
